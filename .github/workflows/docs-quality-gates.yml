name: Docs Quality Gates

on:
  pull_request:
    paths:
      - '**/*.md'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - 'assets/**'
      - '.tmp-link-check.ps1'
      - 'scripts/validate-doc-metadata.ps1'
      - '.github/workflows/docs-quality-gates.yml'
  push:
    branches: ["main"]
    paths:
      - '**/*.md'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - 'assets/**'
      - '.tmp-link-check.ps1'
      - 'scripts/validate-doc-metadata.ps1'
      - '.github/workflows/docs-quality-gates.yml'
  workflow_dispatch:

jobs:
  links-and-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install MkDocs and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build MkDocs site with wrapper config
        id: build_mkdocs
        shell: bash
        run: |
          REPO_DIR=$(basename "$PWD")
          cd ..
          cat > mkdocs-ci.yml <<WRAP
          INHERIT: ${REPO_DIR}/mkdocs.yml
          docs_dir: ${REPO_DIR}
          site_dir: _ci_site
          WRAP
          python -m mkdocs build --config-file mkdocs-ci.yml
          rm mkdocs-ci.yml
          rm -rf _ci_site
          cd "${REPO_DIR}"

      - name: Run internal markdown link and anchor checks
        id: link_checks
        shell: pwsh
        run: |
          ./.tmp-link-check.ps1
          $issues = Get-Content -Raw ./.tmp-link-issues.json | ConvertFrom-Json
          $count = @($issues).Count
          if ($count -gt 0) {
            Write-Host "Found $count link/anchor issue(s)." -ForegroundColor Red
            @($issues) | Select-Object -First 50 | ConvertTo-Json -Depth 5
            exit 1
          }
          Write-Host "No link/anchor issues found." -ForegroundColor Green

      - name: Collect changed markdown files
        id: changed
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'pull_request') {
            $base = '${{ github.event.pull_request.base.sha }}'
            $head = '${{ github.event.pull_request.head.sha }}'
          } elseif ('${{ github.event_name }}' -eq 'push') {
            $base = '${{ github.event.before }}'
            $head = '${{ github.sha }}'
          } else {
            $base = ''
            $head = ''
          }

          if ([string]::IsNullOrWhiteSpace($base) -or [string]::IsNullOrWhiteSpace($head)) {
            $files = Get-ChildItem -Recurse -File -Filter *.md | ForEach-Object { $_.FullName }
            $added = $files
          } else {
            $files = git diff --name-only --diff-filter=ACMR $base $head -- '*.md'
            $added = git diff --name-only --diff-filter=A $base $head -- '*.md'
          }

          $files = @($files) | Where-Object { $_ -and $_ -notmatch '^site/' }
          $added = @($added) | Where-Object { $_ -and $_ -notmatch '^site/' }
          $joined = ($files -join "`n")
          $addedJoined = ($added -join "`n")
          "markdown_files<<EOF" >> $env:GITHUB_OUTPUT
          $joined >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT
          "added_markdown_files<<EOF" >> $env:GITHUB_OUTPUT
          $addedJoined >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT
          "count=$($files.Count)" >> $env:GITHUB_OUTPUT

      - name: Validate metadata schema on changed markdown files
        id: metadata_checks
        if: steps.changed.outputs.count != '0'
        shell: pwsh
        run: |
          $files = @'
          ${{ steps.changed.outputs.markdown_files }}
          '@ -split "`n" | Where-Object { $_ -and $_.Trim().Length -gt 0 }

          $addedFiles = @'
          ${{ steps.changed.outputs.added_markdown_files }}
          '@ -split "`n" | Where-Object { $_ -and $_.Trim().Length -gt 0 }

          Write-Host "Validating metadata for $($files.Count) changed markdown file(s)."
          ./scripts/validate-doc-metadata.ps1 -Files $files -RequireFrontMatterFiles $addedFiles

      - name: Write Docs Quality Gates summary
        if: always()
        shell: pwsh
        run: |
          $jobStatus = '${{ job.status }}'
          $mkdocsOutcome = '${{ steps.build_mkdocs.outcome }}'
          $linkOutcome = '${{ steps.link_checks.outcome }}'
          $metadataOutcome = '${{ steps.metadata_checks.outcome }}'
          $changedCount = '${{ steps.changed.outputs.count }}'

          $files = @'
          ${{ steps.changed.outputs.markdown_files }}
          '@ -split "`n" | Where-Object { $_ -and $_.Trim().Length -gt 0 }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Docs Quality Gates Summary"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Job status: **$jobStatus**"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- MkDocs build: **$mkdocsOutcome**"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Link and anchor checks: **$linkOutcome**"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Metadata validation: **$metadataOutcome**"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Changed markdown files detected: **$changedCount**"

          if ($files.Count -gt 0) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Changed markdown files"
            foreach ($file in ($files | Select-Object -First 30)) {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- $file"
            }
            if ($files.Count -gt 30) {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- ... and $($files.Count - 30) more"
            }
          }

          if ($jobStatus -ne 'success') {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Triage quick commands"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- ./.tmp-link-check.ps1'
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- $files = git diff --name-only --diff-filter=ACMR -- ''*.md''; $added = git diff --name-only --diff-filter=A -- ''*.md''; ./scripts/validate-doc-metadata.ps1 -Files $files -RequireFrontMatterFiles $added'
          }
