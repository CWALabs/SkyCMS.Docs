name: Deploy Docs to CloudFlare R2

on:
  push:
    branches: ["main"]
    paths:
      - '**/*.md'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - 'assets/**'
      - '.github/workflows/deploy-docs-cloudflare.yml'
  workflow_dispatch:

# Prevent concurrent deployments
concurrency:
  group: "cloudflare-r2-docs"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install MkDocs and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pre-build validate links in Docs source
        run: |
          python << 'EOF'
          import re
          from pathlib import Path
          from urllib.parse import urlparse, unquote

          docs_root = Path('.').resolve()
          ignored_parts = {'_archive', '_site', '_templates', '_Marketing', 'images/screenshots', 'legacy', 'notes', 'scripts', '.github'}
          link_re = re.compile(r'\[[^\]]+\]\(([^)]+)\)')

          broken = []

          for md_file in docs_root.rglob('*.md'):
              rel_md = md_file.relative_to(docs_root).as_posix()
              if any(part in rel_md for part in ignored_parts):
                  continue

              content = md_file.read_text(encoding='utf-8', errors='ignore')
              for raw_target in link_re.findall(content):
                  target = raw_target.strip()
                  if not target:
                      continue

                  parsed = urlparse(target)
                  if parsed.scheme in ('http', 'https', 'mailto', 'tel', 'javascript', 'data'):
                      continue

                  path_part = unquote(parsed.path or '')
                  if not path_part or path_part.startswith('#'):
                      continue

                  if '.md' not in path_part.lower():
                      continue

                  if path_part.startswith('/'):
                      candidate = (Path('.').resolve() / path_part.lstrip('/')).resolve()
                  else:
                      candidate = (md_file.parent / path_part).resolve()

                  if not candidate.exists():
                      broken.append(f"{rel_md} -> {target}")

          if broken:
              print(f"❌ Broken source links found: {len(broken)}")
              for item in broken[:300]:
                  print(f"  {item}")
              raise SystemExit(1)

          print('✅ Source markdown links validated.')
          EOF
      
      - name: Build MkDocs site
        run: |
          # MkDocs forbids the config file inside docs_dir, so create a
          # wrapper config one level up that inherits the repo config.
          REPO_DIR=$(basename "$PWD")
          cd ..
          cat > mkdocs-ci.yml <<WRAP
          INHERIT: ${REPO_DIR}/mkdocs.yml
          docs_dir: ${REPO_DIR}
          site_dir: _ci_site
          WRAP
          python -m mkdocs build --config-file mkdocs-ci.yml
          # Move output back so downstream steps find it at ./site
          mv _ci_site "${REPO_DIR}/site"
          rm mkdocs-ci.yml
          cd "${REPO_DIR}"

      - name: Capture critical homepage assets
        run: |
          python << 'EOF'
          import re
          from pathlib import Path

          site = Path('./site').resolve()
          index_html = site / 'index.html'
          if not index_html.exists():
              raise SystemExit('❌ Missing generated site/index.html')

          content = index_html.read_text(encoding='utf-8', errors='ignore')
          assets = []

          for pattern in (
              r'href=["\'](assets/[^"\']+)["\']',
              r'src=["\'](assets/[^"\']+)["\']',
          ):
              for match in re.findall(pattern, content, flags=re.IGNORECASE):
                  asset = match.split('?', 1)[0].split('#', 1)[0]
                  if asset not in assets:
                      assets.append(asset)

          if not assets:
              raise SystemExit('❌ No local homepage assets were detected in site/index.html')

          missing = [asset for asset in assets if not (site / asset).exists()]
          if missing:
              print('❌ Homepage references generated assets that are missing locally:')
              for asset in missing:
                  print(f'  {asset}')
              raise SystemExit(1)

          output = site / 'required-assets.txt'
          output.write_text('\n'.join(assets) + '\n', encoding='utf-8')

          print('✅ Captured homepage assets:')
          for asset in assets:
              print(f'  {asset}')
          EOF

      - name: Debug generated homepage assets
        run: |
          echo "ℹ️ Required homepage assets:"
          cat ./site/required-assets.txt
          echo ""
          echo "ℹ️ Generated stylesheet inventory:"
          find ./site/assets/stylesheets -maxdepth 1 -type f -printf "%P %s bytes\n" | sort
          echo ""
          echo "ℹ️ Generated CSS inventory:"
          find ./site/assets/css -maxdepth 1 -type f -printf "%P %s bytes\n" | sort
          echo ""
          echo "ℹ️ Generated JavaScript inventory:"
          find ./site/assets/javascripts -maxdepth 2 -type f -printf "%P %s bytes\n" | sort

      - name: Disallow markdown hrefs in generated site
        run: |
          python << 'EOF'
          import re
          from pathlib import Path
          from urllib.parse import urlparse, unquote

          site = Path('./site').resolve()
          href_re = re.compile(r'href=["\']([^"\']+)["\']', re.IGNORECASE)

          markdown_hrefs = []

          for html_file in site.rglob('*.html'):
            content = html_file.read_text(encoding='utf-8', errors='ignore')
            for href in href_re.findall(content):
              if '.md' not in href.lower():
                continue

              parsed = urlparse(href)
              if parsed.scheme in ('http', 'https'):
                continue

              path_part = unquote(parsed.path or '')
              if not path_part:
                continue

              referrer = html_file.relative_to(site)
              markdown_hrefs.append(f"{referrer} -> {href}")

          if markdown_hrefs:
            print(f"❌ Markdown hrefs found in generated site: {len(markdown_hrefs)}")
            for item in markdown_hrefs[:200]:
              print(f"  {item}")
            raise SystemExit(1)

          print('✅ No internal markdown hrefs found in generated site.')
          EOF
      
      - name: Validate links in documentation
        id: linkcheck
        run: |
          python -m pip install --upgrade pip
          pip install linkchecker
          echo "ℹ️ Running linkchecker as advisory signal (non-blocking)."
          linkchecker ./site \
            --check-extern \
            --timeout=20 \
            --threads=4 \
            --ignore-url='(^|/)sitemap\.xml\.gz$|^/assets/|^_Marketing/|validate-screenshots\.ps1$|validate-screenshots\.yml$|/Editors/LiveEditor/VisualGuide/?$|^https://docs\.sky-cms\.com/'
        continue-on-error: true

      - name: Link check summary
        if: steps.linkcheck.outcome == 'failure'
        run: |
          echo "### ⚠️ Link validation found issues" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployment continued (advisory step), but linkchecker detected issues/noise." >> $GITHUB_STEP_SUMMARY
          echo "Review the \"Validate links in documentation\" step logs for exact URLs and referrers." >> $GITHUB_STEP_SUMMARY
      
      - name: Check for broken anchors
        run: |
          python << 'EOF'
          import re
          from pathlib import Path
          from urllib.parse import urlparse, unquote
          
          broken_anchors = []
          site_root = Path('./site').resolve()
          html_files = list(site_root.glob('**/*.html'))
          ignored_referrers = {
              Path('images/screenshots/INDEX/index.html'),
          }
          
          for html_file in html_files:
              referrer = html_file.relative_to(site_root)
              if referrer in ignored_referrers:
                  continue

              content = html_file.read_text(encoding='utf-8', errors='ignore')
              hrefs = re.findall(r'href=["\']([^"\']*#[^"\']*)["\']', content)

              for href in hrefs:
                  parsed = urlparse(href)

                  if parsed.scheme in ('http', 'https', 'mailto', 'tel', 'javascript', 'data'):
                      continue

                  anchor = unquote(parsed.fragment or '')
                  if not anchor:
                      continue

                  path_part = unquote(parsed.path or '')

                  if path_part.startswith('/'):
                      target_file = (site_root / path_part.lstrip('/')).resolve()
                  elif path_part:
                      target_file = (html_file.parent / path_part).resolve()
                  else:
                      target_file = html_file.resolve()

                  if target_file.is_dir():
                      target_file = (target_file / 'index.html').resolve()
                  elif not target_file.exists() and target_file.suffix == '':
                      candidate = (target_file / 'index.html').resolve()
                      if candidate.exists():
                          target_file = candidate

                  if not target_file.exists() or target_file.suffix.lower() != '.html':
                      continue

                  target_content = target_file.read_text(encoding='utf-8', errors='ignore')
                  target_ids = set(re.findall(r'id=["\']([^"\']+)["\']', target_content))

                  if anchor not in target_ids:
                      target_rel = target_file.relative_to(site_root)
                      broken_anchors.append(f"{referrer} -> {target_rel}: Missing anchor #{anchor}")
          
          if broken_anchors:
              print("❌ Broken anchors found:")
              for item in broken_anchors:
                  print(f"  {item}")
              raise SystemExit(1)
          else:
              print("✅ All anchors are valid!")
          EOF
      
      - name: Configure AWS CLI for CloudFlare R2
        run: |
          aws configure set aws_access_key_id ${{ secrets.CLOUD_FLARE_S3_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.CLOUD_FLARE_S3_SECRET_ACCESS_KEY }}
          aws configure set default.region auto
      
      - name: Deploy site to CloudFlare R2 (authoritative sync)
        run: |
          echo "📦 Syncing full generated site to R2..."
          aws s3 sync ./site s3://${{ secrets.R2_BUCKET_NAME }} \
            --endpoint-url https://${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --delete
          echo "✅ R2 bucket synchronized from ./site to bucket root"

      - name: Force upload critical homepage assets
        run: |
          echo "📌 Force-uploading homepage-critical assets..."
          while IFS= read -r asset; do
            [ -n "$asset" ] || continue
            if [ ! -f "./site/$asset" ]; then
              echo "❌ Missing local asset before force upload: $asset"
              exit 1
            fi

            aws s3 cp "./site/$asset" "s3://${{ secrets.R2_BUCKET_NAME }}/$asset" \
              --endpoint-url https://${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
            echo "✅ Force-uploaded $asset"
          done < ./site/required-assets.txt

      - name: Verify critical pages in R2
        run: |
          check_key() {
            local key="$1"
            local attempts=8
            local delay=3
            local i
            for i in $(seq 1 $attempts); do
              if aws s3api head-object \
                --bucket ${{ secrets.R2_BUCKET_NAME }} \
                --key "$key" \
                --endpoint-url https://${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com > /dev/null; then
                echo "✅ Found $key"
                return 0
              fi
              echo "⏳ Waiting for $key (attempt $i/$attempts)..."
              sleep $delay
            done
            echo "❌ Missing required object: $key"
            return 1
          }

          check_key "index.html"
          check_key "getting-started/quick-start/index.html"
          check_key "for-editors/overview/index.html"
          while IFS= read -r asset; do
            [ -n "$asset" ] || continue
            check_key "$asset"
          done < ./site/required-assets.txt
          echo "✅ Verified key pages exist in R2"

      - name: Debug R2 key listing on verification failure
        if: failure()
        run: |
          echo "ℹ️ Debug listing for root and key docs folders:"
          aws s3 ls s3://${{ secrets.R2_BUCKET_NAME }} \
            --endpoint-url https://${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com | head -n 50
          echo ""
          echo "ℹ️ Required homepage assets for this run:"
          cat ./site/required-assets.txt
          echo ""
          echo "ℹ️ R2 assets root:"
          aws s3 ls s3://${{ secrets.R2_BUCKET_NAME }}/assets/ \
            --endpoint-url https://${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com | head -n 50
          echo ""
          echo "ℹ️ R2 stylesheet assets:"
          aws s3 ls s3://${{ secrets.R2_BUCKET_NAME }}/assets/stylesheets/ \
            --endpoint-url https://${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com | head -n 50
          echo ""
          echo "ℹ️ R2 CSS assets:"
          aws s3 ls s3://${{ secrets.R2_BUCKET_NAME }}/assets/css/ \
            --endpoint-url https://${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com | head -n 50
          echo ""
          echo "ℹ️ R2 JavaScript assets:"
          aws s3 ls s3://${{ secrets.R2_BUCKET_NAME }}/assets/javascripts/ \
            --endpoint-url https://${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com | head -n 50
          aws s3 ls s3://${{ secrets.R2_BUCKET_NAME }}/getting-started/ \
            --endpoint-url https://${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com | head -n 50
          aws s3 ls s3://${{ secrets.R2_BUCKET_NAME }}/for-editors/ \
            --endpoint-url https://${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com | head -n 50
      
      - name: Purge CloudFlare cache
        id: purge_cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ZONE_ID" ]; then
            curl -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"purge_everything":true}' \
              --fail-with-body
          else
            echo "CloudFlare cache purge skipped - credentials not configured"
          fi
        continue-on-error: true

      - name: Validate live homepage assets
        run: |
          python << 'EOF'
          import time
          from pathlib import Path
          from urllib.parse import urljoin

          import requests

          site_url = 'https://docs.sky-cms.com/'
          asset_file = Path('./site/required-assets.txt')
          assets = [line.strip() for line in asset_file.read_text(encoding='utf-8').splitlines() if line.strip()]

          failures = []
          session = requests.Session()

          def fetch_ok(url: str):
              last_error = None
              for attempt in range(1, 9):
                  try:
                      response = session.get(url, timeout=20)
                      if response.status_code == 200:
                          return response
                      last_error = f'status={response.status_code}'
                  except requests.RequestException as exc:
                      last_error = str(exc)

                  print(f'⏳ Waiting for {url} (attempt {attempt}/8): {last_error}')
                  time.sleep(3)

              raise RuntimeError(last_error or 'unknown error')

          homepage = fetch_ok(f'{site_url}?cachebust={int(time.time())}')
          print(f'✅ Homepage live check passed ({homepage.status_code})')

          for asset in assets:
              url = urljoin(site_url, asset)
              cachebusted = f'{url}?cachebust={int(time.time())}'
              try:
                  response = fetch_ok(cachebusted)
              except RuntimeError as exc:
                  failures.append(f'{asset} -> {exc}')
                  continue

              content_type = response.headers.get('Content-Type', '')
              if asset.endswith('.css') and 'text/css' not in content_type:
                  failures.append(f'{asset} -> unexpected content type {content_type!r}')
                  continue

              print(f'✅ Live asset check passed: {asset} ({content_type or "no content-type"})')

          if failures:
              print('❌ Live asset validation failed:')
              for failure in failures:
                  print(f'  {failure}')
              raise SystemExit(1)
          EOF
      
      - name: Deployment summary
        run: |
          echo "### ✅ Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Validation Checks:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ MkDocs build completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Homepage-linked assets verified in generated output" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ External links validated" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Internal anchors validated" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Live homepage assets validated after cache purge" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- R2 Bucket authoritative sync target: \`${{ secrets.R2_BUCKET_NAME }}\` (root)" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.purge_cache.outcome }}" = "success" ] && [ -n "${{ env.CLOUDFLARE_ZONE_ID }}" ]; then
            echo "- CDN Cache: ✅ Purged" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.purge_cache.outcome }}" = "failure" ]; then
            echo "- CDN Cache: ⚠️ Purge failed; deployment still completed. Verify CLOUDFLARE_ZONE_ID and API token permissions." >> $GITHUB_STEP_SUMMARY
          else
            echo "- CDN Cache: ⏭️ Skipped (no Zone ID configured)" >> $GITHUB_STEP_SUMMARY
          fi
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}