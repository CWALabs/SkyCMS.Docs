name: Validate Screenshots

on:
  push:
    paths:
      - 'assets/images/screenshots/**'
  pull_request:
    paths:
      - 'assets/images/screenshots/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PowerShell
        shell: pwsh
        run: |
          # PowerShell is pre-installed on ubuntu-latest
          Write-Host "PowerShell version: $(pwsh --version)"

      - name: Run screenshot validation
        shell: pwsh
        run: |
          $scriptPath = Join-Path ${{ github.workspace }} "scripts/validate-screenshots.ps1"
          if (Test-Path $scriptPath) {
            & $scriptPath -Verbose
          } else {
            Write-Host "⚠️  validate-screenshots.ps1 not found at $scriptPath — skipping validation."
          }

      - name: Check for INDEX.md changes
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          # Verify that if screenshots were added, INDEX.md was updated
          $screenshotFiles = git diff --name-only ${{ github.event.pull_request.base.sha }}..HEAD -- "assets/images/screenshots/*.webp"
          
          if ($screenshotFiles) {
              Write-Host "New screenshot files detected:"
              $screenshotFiles | ForEach-Object { Write-Host "  - $_" }
              
              $indexChanges = git diff --name-only ${{ github.event.pull_request.base.sha }}..HEAD -- "assets/images/screenshots/INDEX.md"
              
              if (-not $indexChanges) {
                  Write-Host "⚠️  Warning: Screenshots added but INDEX.md was not updated"
                  Write-Host "The validation script should auto-update INDEX.md status."
              } else {
                  Write-Host "✅ INDEX.md was updated"
              }
          }

      - name: Report summary
        if: always()
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "=== Validation Complete ===" -ForegroundColor Cyan
          Write-Host "Review the validation output above for any issues."
          Write-Host ""
          Write-Host "Next steps:"
          Write-Host "  • If validation failed: fix the issues and push again"
          Write-Host "  • If validation passed: ready to merge!"
          Write-Host ""
