site_name: SkyCMS Documentation
site_description: Fast, edge-native CMS for developers and content teams
site_url: https://docs.sky-cms.com

# Documentation source is the repo root
docs_dir: '.'

# Build output must be outside docs_dir when docs_dir is '.'
site_dir: '../_skycms_docs_site'

# Theme configuration
theme:
  name: material
  logo: assets/images/sky-logo.png
  palette:
    - scheme: light
      primary: blue
      accent: blue
    - scheme: dark
      primary: blue
      accent: blue
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
  highlightjs: true
  hljs_languages:
    - yaml
    - rust
    - csharp
    - javascript
    - typescript
    - json
    - bash
    - powershell

# Plugins
plugins:
  - search

# Markdown extensions
markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - attr_list
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - def_list
  - footnotes
  - meta
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - assets/css/mkdocs-logo.css

